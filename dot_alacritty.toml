import = [
  "~/alacritty-themes/leaves.toml"
]

[window]
dimensions = { columns = 120, lines = 20 }
decorations = "Full"
padding = { x = 40, y = 30 }
opacity = 0.95
blur = true

[font]
normal = { family = "FiraCode Nerd Font", style = "medium" }

[cursor]
style = { shape = "Underline", blinking = "Always" }
blink_interval = 100

[keyboard]
#bindings = [{ <key>, <mods>, <mode>, <action> | <chars> },]
bindings = [{ key = "n", mods = "Control | Shift", action = "CreateNewWindow" },]

[selection]
save_to_clipboard = true
