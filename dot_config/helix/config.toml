theme = "poimandres"

[editor]
line-number = "relative"
mouse = true
cursorline = true
cursorcolumn = true
auto-completion = true
bufferline = "always"

[editor.statusline]
left = ["mode", "file-name"]
center = ["file-absolute-path", "file-modification-indicator"]
right = ["diagnostics", "selections", "primary-selection-length", "position", "file-encoding", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-exclude = false
git-ignore = false
git-global = false
ignore = false

[editor.whitespace]
render = "all"

[editor.indent-guides]
render = true
character = "┆" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.soft-wrap]
enable = true
max-wrap = 25 # increase value to reduce forced mid-word wrapping
max-indent-retain = 0
#wrap-indicator = ""  # set wrap-indicator to "" to hide it
